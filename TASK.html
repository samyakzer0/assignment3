<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- IMAGE, AUDIO, VIDEO, IFRAME, EMBED, OBJECT, SVG , CANVAS-->

     <h1>Showing Image 1</h1>
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQXx1-kZR-8xL27rQgg9SB41SC4Nd9FUDLgmw&s" alt="Image 1">

    <h1> Audio</h1>
    <audio controls>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <h1> Video</h1>
    <video controls width = "600" height = "400">
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video>

    <h1> Showing Website</h1>
    <iframe width="600" height="400" src = "https://www.wikipedia.org/" title ="wikipedia" frameborder="1" ></iframe>

    <h1>Embedding Document</h1>
    <embed src="https://www.rd.usda.gov/sites/default/files/pdf-sample_0.pdf" type="application/pdf" width="600" height="400">

    <h1>Object </h1>
    <object data="https://www.rd.usda.gov/sites/default/files/pdf-sample_0.pdf" type="application/pdf" width="600" height="400">NOT AVAILABLE</object>
    
    <h1>SVG</h1>
    <svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="40" stroke="black" stroke-width="4" fill="red" />
    </svg>

    <h1>Canvas</h1>
    <canvas id="myCanvas" width="600" height="400" style="border:1px solid #000000;">Your browser does not support the HTML canvas tag
    </canvas>

    <script>
var c = document.getElementById("myCanvas");
var ctx = c.getContext("2d");
ctx.beginPath();
ctx.arc(95, 50, 40, 0, 2 * Math.PI);
ctx.stroke();
</script>

</body>
</html>
