<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="timetable.css">
    <title>Time Table</title>
</head>
<body>

    <h1>Time Table </h1>

    <table>
        <tr class="header">
            <th></th>
            <th>1</th>
            <th>2</th>
            <th>3</th>
            <th></th>
            <th colspan="2">4</th>
            <th colspan="2">6</th>
        </tr>

        <tr>
            <td class="day">Mon</td>
            <td class="citrus">C++</td>
            <td class="mint">HTML</td>
            <td class="mint">CSS</td>
            <th rowspan="5">B<br>R<br>E<br>A<br>K</th>
            <td colspan="2" class="citrus">JAVA</td>
            <td colspan="2" class="citrus">C++</td>
        </tr>

        <tr>
            <td class="day">Tue</td>
            <td rowspan="3" class="peach">Hindi</td>
            <td colspan="2" class="mint">Webdev</td>
            <td class="citrus">C++</td>
            <td class="mint">HTML</td>
            <td class="mint">CSS</td>
            <td rowspan="2" class="berry">OS</td> 
        </tr>

        <tr>
            <td class="day">Wed</td>
            <td colspan="2" class="citrus">C++</td>
            <td colspan="3" class="mint">Django</td>
        </tr>

        <tr>
            <td class="day">Thu</td>
            <td colspan="2" class="citrus">Java</td>
            <td class="peach">English</td>
            <td class="citrus">GO</td>
            <td colspan="2" class="berry">Networks</td>
        </tr>

        <tr>
            <td class="day">Fri</td>
            <td colspan="3" class="berry">Data Science</td>
            <td colspan="2" class="citrus">C++</td>
            <td class="citrus">GO</td>
            <td class="citrus">PYTHON</td>
        </tr>
    </table>

</body>
</html>
