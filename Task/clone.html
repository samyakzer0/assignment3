<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="clone.css">
    <title>Medium Clone</title>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Medium</div>
        <div class="search-bar">
            <input type="text" placeholder="Search">
        </div>
    </nav>

    <div class="main-container">
        <div class="left-sidebar">
            <nav class="dashboard">
                <a href="#" class="menu">Home</a>
                <a href="#" class="menu">Library</a>
                <a href="#" class="menu">Profile</a>
                <a href="#" class="menu">Stories</a>
                <a href="#" class="menu">Stats</a>
            </nav>
            <div class="following-section">
                <h3>Following</h3>
                <ul class="following-list">
                    <li><span class="dot-avatar bg-gold"></span> Coinmonks <span class="active-dot"></span></li>
                    <li><span class="dot-avatar bg-blue"></span> JavaScript in Plain... <span class="active-dot"></span></li>
                </ul>   
            </div>
        </div>

      <main class="feed-content">
      <div class="feed-tabs">
        <span class="tab active">For you</span>
        <span class="tab">Featured</span>
      </div>

        <article class="post-card">
        <div class="post-meta">
          <div class="author-avatar"></div>
          <span class="author-name">Leo Godin</span>
          <span class="post-date">• Mar 2</span>
        </div>
        <div class="post-body">
          <div class="post-text">
            <h2>Claude Code is Great</h2>
            <p>You Just Need to Learn How to Use It</p>
          </div>
          <div class="post-image placeholder-img-1"></div>
        </div>
        <div class="post-footer">
          <div class="footer-left">
            <span>✨ 5K</span>
            <span><i class="fa-regular fa-comment"></i> 149</span>
            <span><i class="fa-solid fa-arrow-rotate-left"></i> 81</span>
          </div>
          <div class="footer-right">
            <i class="fa-regular fa-thumbs-down"></i>
            <i class="fa-regular fa-bookmark"></i>
            <i class="fa-solid fa-ellipsis"></i>
          </div>
        </div>
      </article>
    </div>

</body>
</html>
