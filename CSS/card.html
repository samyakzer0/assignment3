<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <link rel="stylesheet" href="card.css">
</head>
<body>
    <div class="card">
     <div class="image">
        <img src="https://static.vecteezy.com/system/resources/thumbnails/006/599/486/small/majestic-mountain-range-with-snowfall-at-sunrise-morning-photo.jpg" alt="image">
     </div>

    <div class="time">
        <h4>4 days ago.</h4>
    </div>

    <div class="Header">
        <h2>Post One</h2>
    </div>

    <div class="content">
       <p>Lorem ipsum, dolor sit amet consectetur<br> adipisicing elit. Ad ratione blanditiis <br> recusandae nihil odio facere hic dictat<br> quod?</p>
    </div>

    <table class="stats-table">
    <tr>
        <td class="reads">5k<br>Reads</td>
        <td class="views">54321<br>Views</td>
        <td class="comments">32<br>Comments</td>
    </tr>
</table>
    </div>
</body>
</html>
